<div class="drawer-overlay" [class.open]="isOpen" (click)="closeSidebar()"></div>

<div class="drawer-panel" [class.open]="isOpen">
  <div class="drawer-header">
  <div class="header-content">
    <h2>Add New Requisition</h2>
    <p class="drawer-context">
        <!-- Vessel ID: <strong>{{ vesselId }}</strong> |  -->
        Sheet: <strong>{{ activeSheet?.name }}</strong>
    </p>
  </div>
  
  <button class="btn-close" (click)="closeSidebar()" aria-label="Close sidebar">
    <mat-icon>close</mat-icon>
  </button>
</div>

  <div class="drawer-body">
    <div class="form-group">
      <label class="form-label">Item Name / Description</label>
      <input type="text" [(ngModel)]="itemData.name" class="form-control" placeholder="e.g. Engine Oil Grade A">
    </div>

    <div style="display: flex; gap: 16px;">
      <div class="form-group" style="flex: 2;">
        <label class="form-label">Requested Qty</label>
        <input type="number" [(ngModel)]="itemData.totalQty" class="form-control" placeholder="0">
      </div>
      <div class="form-group" style="flex: 1;">        
        <label class="form-label">Unit</label>
              <input type="text" [(ngModel)]="itemData.unit" class="form-control" placeholder="e.g. Litre ,Kgs, Pcs">

        
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Price Per Item (Rs.)</label>
      <div style="position: relative;">
        <span style="position: absolute; left: 12px; top: 8px; color: var(--text-tertiary);">₹</span>
        <input type="number" style="padding-left: 28px;" [(ngModel)]="itemData.price" class="form-control" placeholder="0.00">
      </div>
    </div>
    
    
    <div class="form-group">
      <label class="form-label">REMARKS</label>
      <input type="text" [(ngModel)]="itemData.remarks" class="form-control" placeholder="e.g. Special requirements">
    </div>
    <div class="form-group" style="flex: 1;">
        <label class="form-label">Delivery Date</label>
        <input type="date" [(ngModel)]="itemData.deliveryDate" class="form-control" [min]="minDate">
      </div>
  </div>

 <div class="drawer-footer">
    <button class="btn btn-outline" (click)="closeSidebar()" [disabled]="isSubmitting">
      Cancel
    </button>
    
    <button class="btn btn-primary" (click)="saveItem()" [disabled]="!isFormValid() || isSubmitting">
      <mat-icon style="font-size: 18px; width: 18px; height: 18px;">
        {{ isSubmitting ? 'hourglass_empty' : 'save' }}
      </mat-icon> 
      {{ isSubmitting ? 'Saving...' : 'Create Item' }}
    </button>
  </div>
</div>
